<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coloring Book Generator</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3250;
    --accent: #6c63ff; --accent2: #a78bfa; --text: #e8eaf6; --muted: #7c83a8;
    --green: #4ade80; --red: #f87171; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh; padding: 40px 20px;
  }
  main { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  p.sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
  }
  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
  label:first-child { margin-top: 0; }
  label .req { color: var(--red); }
  input[type=text], input[type=number], select, textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 0.9rem;
    font-family: inherit; resize: vertical;
  }
  .row { display: flex; gap: 16px; }
  .row > div { flex: 1; }
  .with-btn { display: flex; gap: 8px; align-items: stretch; }
  .with-btn input { flex: 1; }
  .btn-inline {
    white-space: nowrap; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 0 14px; border-radius: 8px; font-size: 0.85rem;
    cursor: pointer;
  }
  .btn-inline:hover { border-color: var(--accent); }
  .btn-inline:disabled { opacity: 0.5; cursor: not-allowed; }
  button[type=submit] {
    margin-top: 20px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; border: none; padding: 12px 20px; border-radius: 8px;
    font-size: 0.9rem; font-weight: 600; cursor: pointer; width: 100%;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .progress-wrap { display: none; }
  .progress-bar-bg { background: var(--surface2); border-radius: 8px; height: 10px; overflow: hidden; margin-top: 10px; }
  .progress-bar { background: var(--accent); height: 100%; width: 0%; transition: width 0.3s; }
  .status-line { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }
  .thumbs { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 16px; }
  .thumbs img { width: 100%; border-radius: 4px; border: 1px solid var(--border); background: white; }
  .download-btn { display: none; text-align: center; text-decoration: none; }
  .error { color: var(--red); font-size: 0.85rem; margin-top: 10px; display: none; }
  .hint { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>
<main>
  <h1>🎨 Coloring Book Generator</h1>
  <p class="sub">Generate a unique KDP-ready coloring book interior (line art only, no title/bonus pages) from a topic.</p>

  <div class="card">
    <form id="job-form">
      <label for="topic">Topic <span class="req">*</span></label>
      <input type="text" id="topic" name="topic" placeholder="e.g. forest animals" required />

      <label for="keyword">Keyword (optional)</label>
      <input type="text" id="keyword" name="keyword" placeholder="e.g. relaxing coloring for adults" />

      <label for="title">Title</label>
      <div class="with-btn">
        <input type="text" id="title" name="title" placeholder="Click Generate Title, or type your own" />
        <button type="button" class="btn-inline" id="generate-title-btn">Generate Title</button>
      </div>

      <label for="theme">Theme</label>
      <input type="text" id="theme" name="theme" placeholder="e.g. whimsical enchanted woodland" />

      <label for="style">Style</label>
      <textarea id="style" name="style" rows="2" placeholder="e.g. storybook illustration"></textarea>
      <div class="hint">Theme and Style are applied to every page, so the whole book looks consistent.</div>

      <div class="row">
        <div>
          <label for="page_count">Page count</label>
          <input type="number" id="page_count" name="page_count" min="2" max="300" step="2" value="100" />
        </div>
        <div>
          <label for="trim_size">Trim size</label>
          <select id="trim_size" name="trim_size">
            {% for size in page_sizes %}
            <option value="{{ size }}" {% if size == '8.5x11' %}selected{% endif %}>{{ size }} in</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <button type="submit" id="generate-btn">Generate</button>
      <div class="error" id="error-box"></div>
    </form>
  </div>

  <div class="card progress-wrap" id="progress-card">
    <div class="status-line" id="status-text">Queued…</div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="thumbs" id="thumbs"></div>
    <a class="btn" href="#" id="download-link" download>
      <button class="download-btn" id="download-btn" style="display:none">Download PDF</button>
    </a>
  </div>
</main>

<script>
const form = document.getElementById('job-form');
const topicInput = document.getElementById('topic');
const keywordInput = document.getElementById('keyword');
const titleInput = document.getElementById('title');
const themeInput = document.getElementById('theme');
const styleInput = document.getElementById('style');
const generateTitleBtn = document.getElementById('generate-title-btn');
const generateBtn = document.getElementById('generate-btn');
const progressCard = document.getElementById('progress-card');
const statusText = document.getElementById('status-text');
const progressBar = document.getElementById('progress-bar');
const thumbsEl = document.getElementById('thumbs');
const downloadBtn = document.getElementById('download-btn');
const downloadLink = document.getElementById('download-link');
const errorBox = document.getElementById('error-box');

generateTitleBtn.addEventListener('click', async () => {
  errorBox.style.display = 'none';
  if (!topicInput.value.trim()) {
    errorBox.textContent = 'Enter a topic first.';
    errorBox.style.display = 'block';
    return;
  }
  generateTitleBtn.disabled = true;
  generateTitleBtn.textContent = 'Generating…';
  try {
    const fd = new FormData();
    fd.append('topic', topicInput.value);
    fd.append('theme', themeInput.value);
    fd.append('keyword', keywordInput.value);
    const res = await fetch('/api/title', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to generate title');
    titleInput.value = data.title;
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.style.display = 'block';
  } finally {
    generateTitleBtn.disabled = false;
    generateTitleBtn.textContent = 'Generate Title';
  }
});

let pollTimer = null;
const seenThumbs = new Set();

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.style.display = 'none';
  generateBtn.disabled = true;
  progressCard.style.display = 'block';
  thumbsEl.innerHTML = '';
  seenThumbs.clear();
  downloadBtn.style.display = 'none';
  statusText.textContent = 'Queued…';
  progressBar.style.width = '0%';

  const fd = new FormData();
  fd.append('topic', topicInput.value);
  fd.append('keyword', keywordInput.value);
  fd.append('title', titleInput.value);
  fd.append('theme', themeInput.value);
  fd.append('style', styleInput.value);
  fd.append('page_count', document.getElementById('page_count').value);
  fd.append('trim_size', document.getElementById('trim_size').value);

  try {
    const res = await fetch('/api/jobs', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to start job');
    pollJob(data.job_id);
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.style.display = 'block';
    generateBtn.disabled = false;
  }
});

function pollJob(jobId) {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    const res = await fetch(`/api/jobs/${jobId}`);
    const job = await res.json();

    const pct = job.total ? Math.round((job.completed / job.total) * 100) : 0;
    progressBar.style.width = pct + '%';
    statusText.textContent = `${job.status} — ${job.completed} / ${job.total} designs`;
    if (job.title && !titleInput.value) titleInput.value = job.title;

    (job.thumbnail_urls || []).forEach(url => {
      if (!seenThumbs.has(url)) {
        seenThumbs.add(url);
        const img = document.createElement('img');
        img.src = url;
        thumbsEl.appendChild(img);
      }
    });

    if (job.status === 'done') {
      clearInterval(pollTimer);
      generateBtn.disabled = false;
      downloadLink.href = job.download_url;
      downloadBtn.style.display = 'block';
    } else if (job.status === 'error') {
      clearInterval(pollTimer);
      generateBtn.disabled = false;
      errorBox.textContent = job.error || 'Generation failed';
      errorBox.style.display = 'block';
    }
  }, 3000);
}
</script>
</body>
</html>
